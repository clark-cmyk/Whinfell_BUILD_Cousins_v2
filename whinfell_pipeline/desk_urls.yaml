# Whinfell desk saved-view URLs — wired for Comet / Perplexity / batch_collect.py
# Clark: paste Koyfin share links over REPLACE_ME entries (browser → Share → Copy link).
# After edits, regenerate chart buttons:
#   python3 -m whinfell_pipeline.desk_chart_links
#   python3 -m whinfell_pipeline.desk_china_chart_links
#   python3 -m whinfell_pipeline.desk_china_ladder_models
version: "1.0.0"
updated: "2026-06-28"
desk: Clark
drop_dir: "~/Downloads/whinfell_drop"

# Env vars still override any url field: KOYFIN_VIEW_RATES_URL, etc.

koyfin:
  home: "https://app.koyfin.com/"
  # Saved dashboards — replace REPLACE_ME with Share link from Koyfin when available
  WTM-Rates-Credit:
    url: "${KOYFIN_VIEW_RATES_URL}"
    replace_me: true
    navigate: "My Dashboards → WTM-Rates-Credit (HY OAS, IG OAS, T10Y2Y, DGS10)"
    export_menu: "⋮ menu → Export → CSV"
    panels: ["HY OAS", "IG OAS", "T10Y2Y", "DGS10", "US10Y"]
    assist_urls:
      - "https://app.koyfin.com/macro/USGG2Y10Y"
      - "https://app.koyfin.com/macro/DGS10"
  WTM-Equities-Breadth:
    url: "${KOYFIN_VIEW_EQUITIES_URL}"
    replace_me: true
    navigate: "My Dashboards → WTM-Equities-Breadth (canonical saved view)"
    export_menu: "⋮ menu → Export → CSV"
    panels: ["IWM", "SPY", "XLI", "XLF", "XLU"]
    assist_urls:
      - "https://app.koyfin.com/etf/IWM.US"
      - "https://app.koyfin.com/etf/SPY.US"
    dictionary_dataset: equities
  WTM-Credit-Confirmation:
    url: "${KOYFIN_VIEW_CREDIT_URL}"
    replace_me: true
    navigate: "My Dashboards → WTM-Credit-Confirmation (canonical saved view)"
    export_menu: "⋮ menu → Export → CSV"
    panels: ["HYG", "LQD", "HYG/LQD ratio"]
    assist_urls:
      - "https://app.koyfin.com/etf/HYG.US"
      - "https://app.koyfin.com/etf/LQD.US"
    dictionary_dataset: credit
  WTM-China-Policy:
    url: "${KOYFIN_VIEW_CHINA_URL}"
    wired_url: "https://app.koyfin.com/"
    replace_me: true
    navigate: "My Dashboards → WTM-China-Policy"
    export_menu: "⋮ menu → Export → CSV"
    panels: ["policy_strength", "state_impulse", "growth_impulse"]
    notes: "Paste Koyfin Share link over wired_url when saved dashboard is ready."
    assist_urls:
      - "https://app.koyfin.com/etf/KWEB.US"
      - "https://app.koyfin.com/index/000300.SS"
  WTM-China-Liquidity:
    url: "${KOYFIN_VIEW_CHINA_RATES_URL}"
    wired_url: "https://app.koyfin.com/macro/GCN10YR"
    replace_me: true
    navigate: "China ladder Stage 1 — GCN10YR + USDCNH"
    export_menu: "⋮ menu → Export → CSV"
    panels: ["GCN10YR", "USDCNH"]
    notes: "wired_url uses GCN10YR assist until WTM-China-Liquidity share link is pasted."
    assist_urls:
      - "https://app.koyfin.com/macro/GCN10YR"
      - "https://app.koyfin.com/forex/USDCNH"
  WTM-China-Credit:
    url: "${KOYFIN_VIEW_CHINA_CREDIT_URL}"
    wired_url: "https://app.koyfin.com/etf/KHYB.US"
    replace_me: true
    navigate: "China ladder Stage 2 — KHYB vs 2829.HK (provisional)"
    export_menu: "⋮ menu → Export → CSV"
    panels: ["KHYB", "2829.HK"]
    notes: "wired_url uses KHYB assist until WTM-China-Credit share link is pasted."
    assist_urls:
      - "https://app.koyfin.com/etf/KHYB.US"
      - "https://app.koyfin.com/etf/2829.HK"
  WTM-China-Breadth:
    url: "${KOYFIN_VIEW_CHINA_BREADTH_URL}"
    wired_url: "https://app.koyfin.com/index/000300.SS"
    replace_me: true
    navigate: "China ladder Stage 3 — CSI300 vs HSTECH"
    export_menu: "⋮ menu → Export → CSV"
    panels: ["000300.SS", "HSTECH"]
    notes: "Primary breadth pair: CSI300 vs HSTECH. Fallback if HSTECH unstable in Koyfin: KWEB (desk to confirm)."
    assist_urls:
      - "https://app.koyfin.com/index/000300.SS"
      - "https://app.koyfin.com/index/HSTECH"
      - "https://app.koyfin.com/etf/KWEB.US"
  WTM-China-Cyclical:
    url: "${KOYFIN_VIEW_CHINA_CYCLICAL_URL}"
    wired_url: "https://app.koyfin.com/etf/COPX.US"
    replace_me: true
    navigate: "China ladder Stage 4 — copper + iron ore cyclical beta"
    export_menu: "⋮ menu → Export → CSV"
    notes: "Prefer Barchart futures screen when Koyfin share unavailable; wired_url is COPX assist."
    assist_urls:
      - "https://app.koyfin.com/etf/COPX.US"
  Whinfell-Daily-TimeSeries:
    url: "${KOYFIN_DAILY_EXPORT_URL}"
    replace_me: true
    navigate: "Macro watchlist with Date column + Close fields (BTCUSD, ETHUSD, SPY, US10Y, IBIT)"
    export_menu: "Show table → Download Available Data"
    notes: "Must have Date column. NOT cross-section snapshots. Backup crypto price history only — prefer WTM-Crypto-Price chart."
    raw_export_name: "koyfin_YYYY-MM-DD.csv"
    assist_urls:
      - "https://app.koyfin.com/crypto/BTCUSD"
      - "https://app.koyfin.com/etf/IBIT.US"
  WTM-Crypto-Price:
    url: "${KOYFIN_CRYPTO_PRICE_CHART_URL}"
    wired_url: "https://app.koyfin.com/crypto/BTCUSD"
    replace_me: true
    navigate: "Koyfin chart → WTM-Crypto-Price (BTC spot price history)"
    export_menu: "Show table → Download Available Data"
    canonical_dataset: "btc_price_chart"
    canonical_name: "btc_price_chart_{YYYYMMDD}_{HHMM}.csv"
    notes: "Primary BTC price chart history. Maps to btc_price_chart."
    assist_urls:
      - "https://app.koyfin.com/crypto/BTCUSD"
  WTM-Crypto-Correl:
    url: "${KOYFIN_CRYPTO_CORREL_CHART_URL}"
    wired_url: "https://app.koyfin.com/crypto/BTCUSD"
    replace_me: true
    navigate: "Koyfin chart → WTM-Crypto-Correl (BTC / SPY correlation history)"
    export_menu: "Show table → Download Available Data"
    canonical_dataset: "btc_correl_chart"
    canonical_name: "btc_correl_chart_{YYYYMMDD}_{HHMM}.csv"
    notes: "BTC correlation chart. ETH/XRP/SOL correl charts use eth_correl_chart, xrp_correl_chart, sol_correl_chart datasets."
    assist_urls:
      - "https://app.koyfin.com/crypto/BTCUSD"
      - "https://app.koyfin.com/crypto/ETHUSD"
      - "https://app.koyfin.com/crypto/XRPUSD"
      - "https://app.koyfin.com/crypto/SOLUSD"
  WTM-Crypto-Correl-ETH:
    url: "${KOYFIN_CRYPTO_CORREL_ETH_CHART_URL}"
    wired_url: "https://app.koyfin.com/crypto/ETHUSD"
    replace_me: true
    navigate: "Koyfin chart → ETH / SPY correlation history"
    export_menu: "Show table → Download Available Data"
    canonical_dataset: "eth_correl_chart"
    canonical_name: "eth_correl_chart_{YYYYMMDD}_{HHMM}.csv"
  WTM-Crypto-Correl-XRP:
    url: "${KOYFIN_CRYPTO_CORREL_XRP_CHART_URL}"
    wired_url: "https://app.koyfin.com/crypto/XRPUSD"
    replace_me: true
    navigate: "Koyfin chart → XRP / SPY correlation history"
    export_menu: "Show table → Download Available Data"
    canonical_dataset: "xrp_correl_chart"
    canonical_name: "xrp_correl_chart_{YYYYMMDD}_{HHMM}.csv"
  WTM-Crypto-Correl-SOL:
    url: "${KOYFIN_CRYPTO_CORREL_SOL_CHART_URL}"
    wired_url: "https://app.koyfin.com/crypto/SOLUSD"
    replace_me: true
    navigate: "Koyfin chart → SOL / SPY correlation history"
    export_menu: "Show table → Download Available Data"
    canonical_dataset: "sol_correl_chart"
    canonical_name: "sol_correl_chart_{YYYYMMDD}_{HHMM}.csv"
  WTM-Crypto-Snapshot:
    url: "${KOYFIN_CRYPTO_SNAPSHOT_URL}"
    wired_url: "https://app.koyfin.com/"
    replace_me: true
    navigate: "Optional — crypto spot cross-section (auto from WTM-Credit-Confirmation daily export)"
    export_menu: "⋮ menu → Export → CSV"
    canonical_dataset: "crypto_snapshot"
    canonical_name: "crypto_snapshot_{YYYYMMDD}_{HHMM}.csv"
    notes: "Auto-ingested when credit_*.csv is staged. Separate export optional only."
    dictionary_dataset: credit

barchart:
  home: "https://www.barchart.com/futures/major-commodities"
  my_lists: "https://www.barchart.com/my/lists"
  WTM-Futures-Intraday:
    url: "${BARCHART_SCREEN_INTRADAY_URL}"
    wired_url: "https://www.barchart.com/futures/major-commodities"
    navigate: "My Lists → dailymonitor0610 — OR Major Commodities futures screen"
    export_menu: "Download CSV (top-right)"
    symbols: ["BTC1!", "ES1!", "CL1!", "GC1!", "ZN1!"]
    assist_urls:
      - "https://www.barchart.com/futures/quotes/BTM26"
      - "https://www.barchart.com/futures/quotes/ESM26"
      - "https://www.barchart.com/futures/crypto"
    raw_export_patterns:
      - "*-prices-intraday-*.csv"
      - "watchlist-dailymonitor0610-intraday-*.csv"
  WTM-Futures-Daily:
    url: "${BARCHART_SCREEN_DAILY_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/BTM26/historical-download"
    navigate: "Quote page → Historical Data → Download (daily nearby)"
    export_menu: "Download CSV on historical table"
    symbols: ["BTM26", "ESM26", "CLN26", "GCM26", "ZNM26"]
    assist_urls:
      - "https://www.barchart.com/futures/quotes/BTM26/historical-download"
      - "https://www.barchart.com/futures/quotes/ESM26/historical-download"
      - "https://www.barchart.com/futures/quotes/CLN26/historical-download"
    raw_export_patterns:
      - "*_daily-nearby_historical-data-*.csv"
  WTM-China-Cyclical:
    url: "${BARCHART_SCREEN_CHINA_CYCLICAL_URL}"
    wired_url: "https://www.barchart.com/futures/major-commodities"
    navigate: "Major Commodities — copper + iron ore leadership"
    export_menu: "Download CSV (top-right)"
    symbols: ["HG1!", "SCO1!"]
    notes: "BLOCKING: confirm exact desk Barchart contract symbols (provisional HGK26 + SCO26 assist URLs)."
    assist_urls:
      - "https://www.barchart.com/futures/quotes/HGK26"
      - "https://www.barchart.com/futures/quotes/SCO26"
  WTM-China-Basis:
    url: "${BARCHART_SCREEN_CHINA_BASIS_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/HGK26/spreads"
    navigate: "Copper quote → Spreads tab (China ladder Stage 5)"
    export_menu: "Download CSV"
    notes: "BLOCKING: confirm copper + iron ore front/deferred spread contracts on desk Barchart screen."
    assist_urls:
      - "https://www.barchart.com/futures/quotes/HGK26/spreads"
      - "https://www.barchart.com/futures/quotes/SCO26/spreads"
  WTM-China-Futures-Daily:
    url: "${BARCHART_SCREEN_CHINA_DAILY_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/HGK26/historical-download"
    navigate: "Copper nearby historical — roll / curve context"
    export_menu: "Download CSV on historical table"
    assist_urls:
      - "https://www.barchart.com/futures/quotes/HGK26/historical-download"
      - "https://www.barchart.com/futures/quotes/SCO26/historical-download"
  WTM-BTC-Basis:
    url: "${BARCHART_SCREEN_BASIS_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/BTM26/spreads"
    navigate: "BTC quote → Spreads tab — OR futures-spreads-btm screen"
    export_menu: "Download CSV"
    raw_export_patterns:
      - "futures-spreads-btm*"
      - "futures-spreads-btn*"
  WTM-Options-Greeks:
    url: "${BARCHART_SCREEN_OPTIONS_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/BTN26/options"
    navigate: "BTN26 options → side-by-side chain → Download"
    export_menu: "Download CSV"
    optional: true
    raw_export_patterns:
      - "*-options-*side-by-side-intraday*"
      - "*-volatility-greeks-*"

transmission_control: "file://{{REPO}}/08_Deliverables/Whinfell_Transmission_Control.html"