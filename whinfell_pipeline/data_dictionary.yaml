      - Simplify for history

# ---------------------------------------------------------------------------
# Source system definitions (ingestion routing keys)
# ---------------------------------------------------------------------------
source_systems:
  koyfin_snapshot_csv:
    vendor: koyfin
    shape: cross_section
    description: Broad watchlist/snapshot export (Ticker, Last Price, returns, vol)
    detect:
      headers_any: ["Ticker", "Last Price"]
      filename_patterns: ["crypto_snapshot_*", "credit_*"]
    parser: whinfell_pipeline.crypto_sleeve.parse_snapshot_rows
    outputs: [snapshot_validation, universe_membership]
    raw_metadata_field: _raw

  koyfin_correlation_csv:
    vendor: koyfin
    shape: dated_series
    description: Date + pairwise SPY correlation columns (HYG SPY Corr, etc.)
    detect:
      headers_any: ["Date"]
      headers_pattern: "SPY Corr"
      filename_patterns: ["koyfin_*-*-*.csv", "crypto_corr_series_*"]
    parser: whinfell_pipeline.crypto_sleeve.parse_correlation_series
    outputs: [correlation_series]
    raw_metadata_field: raw_labels

  koyfin_saved_chart:
    vendor: koyfin
    shape: dated_series
    description: Saved chart object export (WTM-Crypto-Price, correl charts)
    detect:
      headers_any: ["Date"]
      filename_patterns:
        - "btc_price_chart_*"
        - "btc_correl_chart_*"
        - "eth_correl_chart_*"
        - "xrp_correl_chart_*"
        - "sol_correl_chart_*"
    parser: whinfell_pipeline.crypto_sleeve.parse_chart_timeseries
    outputs: [historical_timeseries]
    priority: primary

  koyfin_wide_timeseries:
    vendor: koyfin
    shape: dated_panel
    description: Whinfell-Daily-TimeSeries wide export (Date + many Close columns)
    detect:
      headers_any: ["Date"]
      min_close_columns: 4
      filename_patterns: ["koyfin_????-??-??.csv", "rates_*"]
    parser: whinfell_pipeline.raw_csv_transform.koyfin_wide_timeseries
    outputs: [historical_timeseries, correlation_series, global_score_proxy]
    priority: backup

  koyfin_dashboard_object:
    vendor: koyfin
    shape: dashboard
    description: Saved dashboard (WTM-Global-Rates, WTM-Rates-Credit, etc.)
    detect:
      saved_view_prefix: WTM-
    outputs: [operator_navigation]
    note: Dashboards route to snapshot or wide export on CSV download; not a separate parser.

  barchart_core_history:
    vendor: barchart
    shape: dated_series
    description: Core multi-ticker historical quotes (canonical always-on set)
    universe_ref: barchart_core
    detect:
      symbol_in: barchart_core
      filename_patterns: ["barchart_core_*", "futures_daily_*", "futures_intraday_*"]
    outputs: [historical_timeseries, quote_snapshot]
    priority: primary

  barchart_curve_history:
    vendor: barchart
    shape: dated_series
    description: Contract-level curves, spreads, and strategy symbols
    universe_ref: barchart_curves
    detect:
      symbol_in: barchart_curves
      filename_patterns: ["btc_basis_*", "futures-spreads-*"]
    outputs: [curve_series, basis_spread, term_structure]
    priority: curve_only

  barchart_quote_snapshot:
    vendor: barchart
    shape: cross_section
    description: Watchlist / intraday screen snapshot (Symbol, Latest)
    detect:
      headers_any: ["Symbol", "Latest"]
    outputs: [quote_snapshot, execution_l3]
    note: Dense mixed watchlists are NOT canonical import universe.

