    active_globs:
      - "08_Deliverables/Perplexity_*.txt"
      - "08_Deliverables/Perplexity_*.md"
      - "08_Deliverables/Comet_Shortcuts_WTM.md"
      - "08_Deliverables/Whinfell_Data_Update_Guide.md"
      - "08_Deliverables/Whinfell_Transmission_Ladder_Teach_In.md"
