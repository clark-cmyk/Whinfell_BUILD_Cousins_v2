# ---------------------------------------------------------------------------
# Project structure — folder paths and roles
# ---------------------------------------------------------------------------
project_structure:
  repo_root: "~/Desktop/Whinfell_BUILD_Cousins"
  drop_dir: "~/Downloads/whinfell_drop"
  hydration_path: "data/hydration/latest.json"
  transmission_control: "08_Deliverables/Whinfell_Transmission_Control.html"
  directories:
    "01_Strategy_Docs": "Operating plans, progress logs, Master Data Dictionary"
    "04_Score_Calculation": "Credit confirmation score logic"
    "05_Fallback_Tools": "Excel fallback dashboards"
    "06_Testing_Logs": "Integration and prompt test logs"
    "07_Reference_Materials": "Ticker master list, review logs"
    "08_Deliverables": "Desk HTML, guides, Comet shortcuts"
    "data/global/v1": "Global observations parquet"
    "data/china_policy/v1": "China policy observations parquet"
    "data/crypto/v1": "Crypto sleeve sidecar JSON"
    "data/execution/v1": "Execution L3 sidecar JSON"
    "data/hydration": "Hydration bundle (latest.json)"
    "whinfell_pipeline": "Ingestion, transform, hydrate pipeline"
    "scripts": "Desk shell scripts and launchers"

# ---------------------------------------------------------------------------
# Watchlist names — Koyfin saved views and Barchart screens
# ---------------------------------------------------------------------------
watchlist_names:
  koyfin_saved_views:
    WTM-Rates-Credit:
      dataset: rates
      filename_pattern: "rates_{YYYYMMDD}_{HHMM}.csv"
      vendor_detect_glob: "koyfin_????-??-??.csv"
    WTM-Equities-Breadth:
      dataset: equities
      filename_pattern: "equities_{YYYYMMDD}_{HHMM}.csv"
      vendor_detect_glob: "koyfin_simplify_all_etfs_*"
    WTM-Credit-Confirmation:
      dataset: credit
      filename_pattern: "credit_{YYYYMMDD}_{HHMM}.csv"
      vendor_detect_glob: "koyfin_whinpump*"
      feeds: [crypto_sleeve_snapshot, global_score_proxy]
    WTM-China-Policy:
      dataset: china_policy
      filename_pattern: "china_policy_{YYYYMMDD}_{HHMM}.csv"
    WTM-Crypto-Price:
      dataset: btc_price_chart
      filename_pattern: "btc_price_chart_{YYYYMMDD}_{HHMM}.csv"
    WTM-Crypto-Correl:
      dataset: correl_chart
      filename_pattern: "{asset}_correl_chart_{YYYYMMDD}_{HHMM}.csv"
      assets: [btc, eth, xrp, sol]
    WTM-BTC-Basis:
      dataset: btc_basis
      filename_pattern: "btc_basis_{YYYYMMDD}.csv"
  koyfin_watchlists:
    WTM-Import-Core:
      role: source_of_truth
      status: planned
      replaces: WhinPump
    WTM-Import-Curves:
      role: curve_only
      status: planned
    WTM-Research-Sandbox:
      role: deprecated_for_ingest
      status: planned
  barchart_screens:
    WTM-Futures-Intraday:
      dataset: futures_intraday
      filename_pattern: "futures_intraday_{YYYYMMDD}_{HHMM}.csv"
    WTM-Futures-Daily:
      dataset: futures_daily
      filename_pattern: "futures_daily_{YYYYMMDD}_{HHMM}.csv"

# ---------------------------------------------------------------------------
# File naming conventions — staged contract and vendor→canonical map
# ---------------------------------------------------------------------------
file_naming_conventions:
  staged_contract:
    observation_row: "{dataset}_{YYYYMMDD}_{HHMM}.csv"
    product_flavor: "{product}_{flavor}_{YYYYMMDD}.csv"
    normalize_script: "scripts/normalize_whinfell_drop.sh"
    quarantine_dir: "data/staged/quarantine"
  normalize_rules:
    - detect_glob: "koyfin_whinpump*"
      canonical_template: "credit_{YYYYMMDD}_{HHMM}.csv"
      dataset: credit
      saved_view: WTM-Credit-Confirmation
    - detect_glob: "koyfin_simplify_all_etfs_*"
      canonical_template: "equities_{YYYYMMDD}_{HHMM}.csv"
      dataset: equities
      saved_view: WTM-Equities-Breadth
    - detect_glob: "koyfin_????-??-??.csv"
      canonical_template: "rates_{YYYYMMDD}_{HHMM}.csv"
      dataset: rates
      saved_view: WTM-Rates-Credit
    - detect_glob: "koyfin_????-??-??-?.csv"
      canonical_template: "crypto_corr_series_{YYYYMMDD}_{HHMM}.csv"
      dataset: crypto_corr_series
    - detect_glob: "*_daily-nearby_historical-data-*"
      canonical_template: "futures_daily_{YYYYMMDD}_{HHMM}.csv"
      dataset: futures_daily
      saved_view: WTM-Futures-Daily
    - detect_glob: "*-prices-intraday-*"
      canonical_template: "futures_intraday_{YYYYMMDD}_{HHMM}.csv"
      dataset: futures_intraday
      saved_view: WTM-Futures-Intraday
    - detect_glob: "watchlist-*-intraday-*"
      canonical_template: "futures_intraday_{YYYYMMDD}_{HHMM}.csv"
      dataset: futures_intraday
    - detect_glob: "futures-spreads-btn*"
      canonical_template: "btc_basis_{YYYYMMDD}.csv"
      dataset: btc_basis
      saved_view: WTM-BTC-Basis
    - detect_glob: "futures-spreads-btm*"
      canonical_template: "btc_basis_{YYYYMMDD}.csv"
      dataset: btc_basis
  vendor_to_canonical:
    credit_vendor_snapshot: "credit_{YYYYMMDD}_{HHMM}.csv"
    equities_vendor_snapshot: "equities_{YYYYMMDD}_{HHMM}.csv"
    rates_vendor_wide: "rates_{YYYYMMDD}_{HHMM}.csv"
    correl_vendor_export: "crypto_corr_series_{YYYYMMDD}_{HHMM}.csv"
    futures_daily_vendor: "futures_daily_{YYYYMMDD}_{HHMM}.csv"
    btc_basis_vendor: "btc_basis_{YYYYMMDD}.csv"
  canonical_datasets:
    - rates
    - equities
    - credit
    - china_policy
    - futures_intraday
    - futures_daily
    - btc_basis
    - btc_price_chart
    - btc_correl_chart
    - eth_correl_chart
    - xrp_correl_chart
    - sol_correl_chart
    - crypto_corr_series

# ---------------------------------------------------------------------------
# JSON field names and structure — hydration, export, TC state
# ---------------------------------------------------------------------------
json_structures:
  hydration_bundle:
    path: "data/hydration/latest.json"
    version_field: hydration_version
    expected_version: "1.0.0"
    blocks:
      global: [whinfell_score, transmission_state, regime_tag, key_observation, btc_bias]
      china: [sq3_score, sq3_band, policy_strength, state_impulse_score]
      china_ladder: [horizons, weakest_china_stage]
      crypto_sleeve: [assets, charts, correlation_series, snapshot]
      execution: [near_month, basis_spread, btc_bias]
      suggested_tracer: [marks, confirm_required]
  wtm_export:
    format: "WTM EXPORT v2.1"
    legacy_format: "WTM EXPORT v2.0"
    header_fields: [whinfell_score, transmission_state, regime_tag, btc_bias, key_observation]
  transmission_control_state:
    local_storage_key: whinfell_transmission_control_v6
    version_field: version
    current_version: 6
  crypto_sleeve_sidecar:
    path: "data/crypto/v1/latest_crypto_sleeve.json"
    spot_ids: [BTCUSD, ETHUSD, XRPUSD, SOLUSD]

# ---------------------------------------------------------------------------
# Column mappings — display labels → canonical snake_case fields
# ---------------------------------------------------------------------------
column_mappings:
  authority_ref: field_mappings
  wtm_observation_required:
    koyfin: [timestamp, whinfell_score, regime_tag, transmission_state, btc_bias]
    barchart: [timestamp, near_month, basis_spread, spread_type]
  display_to_field:
    "Whinfell Score": whinfell_score
    "Transmission State": transmission_state
    "Regime Tag": regime_tag
    "BTC Bias": btc_bias
    "Near Month": near_month
    "Basis Spread": basis_spread
    "SQ3 Score": sq3_score

# ---------------------------------------------------------------------------
# Ticker standards — vendor format rules
# ---------------------------------------------------------------------------
ticker_standards:
  koyfin:
    format: uppercase_plain
    examples: [BTCUSD, HYG, US10Y, GCN10YR]
  barchart_crypto:
    format: caret_prefix
    examples: ["^BTCUSD", "^ETHUSD"]
  barchart_index:
    format: dollar_prefix
    examples: ["$HSI", "$VHSI", "$VXHY"]
  barchart_futures:
    format: contract_code
    examples: [BTM26, GCY00, HGY00]
  resolution: canonical_assets

