# Transmission output blocks (hydration bundle + WTM export extensions)
# ---------------------------------------------------------------------------
transmission_outputs:
  hydration_bundle:
    version: "1.0.0"
    blocks:
      global: {source: parquet, fields: [whinfell_score, transmission_state, regime_tag, key_observation, btc_bias]}
      china: {source: parquet, fields: [sq3_score, sq3_band, policy_strength, state_impulse_score]}
      china_ladder: {source: derived, fields: [horizons, weakest_china_stage]}
      crypto_sleeve: {source: data/crypto/v1/latest_crypto_sleeve.json, fields: [assets, charts, correlation_series, snapshot]}
      execution: {source: data/execution/v1/latest_execution.json, fields: [near_month, basis_spread, btc_bias]}
      suggested_tracer: {source: derived, confirm_required: true}
  output_kinds:
    snapshot: cross_sectional current-state validation
    historical_timeseries: dated price/level series
    correlation_series: dated pairwise correlation series
    curve_series: contract-level term structure
    derived_signals: whinfell_score, sq3_score, china_ladder, btc_bias