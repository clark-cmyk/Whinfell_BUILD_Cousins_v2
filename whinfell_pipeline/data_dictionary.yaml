# ---------------------------------------------------------------------------
# Canonical universes (import-driven, not catch-all research)
# ---------------------------------------------------------------------------
universes:
  koyfin_watchlists:
    WTM-Import-Core:
      role: source_of_truth
      description: Canonical cross-section import universe (limited WTM operating set)
      status: planned
      replaces: ad_hoc WhinPump-only validation
    WTM-Import-Curves:
      role: curve_only
      description: Term-structure and curve proxy symbols for ladder/basis context
      status: planned
    WTM-Research-Sandbox:
      role: deprecated_for_ingest
      description: Exploratory list — never auto-ingested
      status: planned

  koyfin_import_core:
    status: active_partial
    note: WhinPump currently proxies core snapshot until WTM-Import-Core is created
    tickers:
      - BTCUSD
      - ETHUSD
      - XRPUSD
      - SOLUSD
      - HYG
      - JAAA
      - BKLN
      - CWB
      - CBON
      - KHYB
      - SPY
      - QQQ
      - XLRE
      - SOFR
      - GC1
      - HG1

  barchart_core:
    role: source_of_truth
    description: Always-on multi-ticker historical download set
    symbols:
      - "^BTCUSD"
      - "^ETHUSD"
      - "^XRPUSD"
      - "^SOLUSD"
      - IBIT
      - GBTC
      - SOFR
      - "$HSI"
      - "$VHSI"
      - "$VXHY"
      - CBON
      - KHYB
      - ASHR
      - DXY00
      - GCY00
      - HGY00

  barchart_curves:
    role: curve_only
    description: Contract curves, strips, and structured spreads — not daily core ingest
    symbol_groups:
      fx_futures: [DXM26, E6M26, J6M26, A6M26]
      metals_curves: [GCN26, GCQ26, GCU26, GCV26, GCX26, GCZ26, GCF27, HGN26, HGQ26]
      energy_curves: [CLQ26, CLG27, CLV26, CLU26, CLZ26, CLX26, CLF27, NGQ26]
      btc_futures_curves: [BTN26, BTQ26, BTU26, BTV26, BTX26, BTZ26, BTH27]
      sofr_curves: [TAN26, TAQ26, TAU26, TAV26, TAX26, TAZ26, TAH27]
      rates_strips: [ZMN26, ZLN26, ZBU26, ZFM26, ZNU26, ZQM26]
      hy_contracts: [OYU26, OYZ26, OYH27, OGU26, OGZ26, OGH27]
      misc_contracts: [LUN26, FLM26, LVN26, QRU26, "S!N26", SQJ26, U7M26, VIN26, YCN26, YQN26]
      structured_spreads:
        - _S_IV_ZBU6_UDU6
        - _S_RT_ZBU6_ZBZ6
        - _S_BF_ZBU6_ZBZ6_ZBH7
        - _S_RT_ZBU6_ZBH7
        - _S_RT_ZBZ6_ZBH7

