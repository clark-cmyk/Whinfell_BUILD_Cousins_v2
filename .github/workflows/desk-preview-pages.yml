# GitHub Pages — Transmission Control + BasisWatch (Actions deploy, no Jekyll)
name: Desk preview (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - '08_Deliverables/Whinfell_Transmission_Control.html'
      - '08_Deliverables/Whinfell_BasisWatch.html'
      - '08_Deliverables/basis_watch.css'
      - '08_Deliverables/basis_watch_analytics.js'
      - '08_Deliverables/desk_china_ladder_models.js'
      - '08_Deliverables/basis_watch_panel.js'
      - '08_Deliverables/data_dictionary_meta.json'
      - 'data/hydration/latest.json'
      - 'data/barchart/v1/barchart_curve_history.json'
      - 'docs/**'
      - 'scripts/build_desk_preview.sh'
      - '.github/workflows/desk-preview-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Build static desk preview
        run: bash scripts/build_desk_preview.sh

      - name: Verify artifact
        run: |
          test -f _desk_preview_out/index.html
          test -f _desk_preview_out/data/hydration/latest.json
          test -f _desk_preview_out/.nojekyll
          grep -q "Transmission Control" _desk_preview_out/index.html
          # After inlining, the main JS (renderAll / appState) must be present directly in index.html
          grep -q 'function renderAll()' _desk_preview_out/index.html || grep -q 'window\.renderAll' _desk_preview_out/index.html || grep -q 'appState' _desk_preview_out/index.html
          # Support JS still present for standalone pages
          test -f _desk_preview_out/basis_watch_panel.js || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _desk_preview_out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4