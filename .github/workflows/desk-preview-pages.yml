# Free GitHub Pages deploy — Transmission Control desk preview
# Enable once: Repo Settings → Pages → Build and deployment → Source: GitHub Actions
name: Desk preview (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - '08_Deliverables/Whinfell_Transmission_Control.html'
      - '08_Deliverables/Whinfell_BasisWatch.html'
      - '08_Deliverables/basis_watch.css'
      - '08_Deliverables/desk_china_ladder_models.js'
      - '08_Deliverables/basis_watch_panel.js'
      - '08_Deliverables/data_dictionary_meta.json'
      - 'data/hydration/latest.json'
      - 'data/barchart/v1/barchart_curve_history.json'
      - 'scripts/build_desk_preview.sh'
      - '.github/workflows/desk-preview-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: desk-preview-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static desk preview
        run: bash scripts/build_desk_preview.sh

      - name: Verify BasisWatch in artifact
        run: |
          test -f _desk_preview_out/Whinfell_BasisWatch.html
          test -f _desk_preview_out/basis_watch.css
          test -f _desk_preview_out/basis_watch_panel.js
          ls -la _desk_preview_out/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _desk_preview_out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        timeout-minutes: 8